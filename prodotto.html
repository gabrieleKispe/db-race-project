<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Prodotto - DB Race</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Stili specifici per la scheda prodotto dettagliata */
        .product-page-content {
            background-color: #DEDEDE;
            padding: 80px 8%;
            min-height: 600px;
            font-family: 'Barlow Condensed', sans-serif;
        }

        .detail-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            background: #FFFFFF;
            border-radius: 16px;
            padding: 40px;
            display: flex;
            gap: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .detail-media {
            flex: 1;
            background: #F7F7F7;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border: 1px solid #EEEEEE;
            max-height: 450px;
        }

        .detail-media img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .detail-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .detail-info .category-badge {
            color: #E30613;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        /* --- SELEZIONE PALLINI COLORE DENTRO IL DETTAGLIO --- */
        .detail-colors-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .detail-colors-box .color-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .detail-colors-box .color-dot:hover,
        .detail-colors-box .color-dot.active {
            transform: scale(1.25);
            border-color: #1A1A1A;
            box-shadow: 0 0 6px rgba(0,0,0,0.3);
        }

        /* Classi colore associate ai pallini */
        .detail-colors-box .color-dot.red { background-color: #E30613; }
        .detail-colors-box .color-dot.grey { background-color: #888888; }
        .detail-colors-box .color-dot.lightgrey { background-color: #D6D6D6; }
        .detail-colors-box .color-dot.blue { background-color: #3498db; }
        .detail-colors-box .color-dot.black { background-color: #1A1A1A; }

        .detail-info h1 {
            font-size: 38px;
            font-weight: 800;
            color: #1A1A1A;
            text-transform: uppercase;
            margin: 0 0 15px 0;
            line-height: 1.1;
        }

        .detail-compat-box {
            background: #F9F9F9;
            border-left: 4px solid #1A1A1A;
            padding: 12px 20px;
            margin-bottom: 25px;
            font-size: 16px;
            text-transform: uppercase;
            color: #444444;
        }

        .detail-compat-box strong {
            color: #E30613;
        }

        .detail-description {
            font-size: 16px;
            color: #555555;
            line-height: 1.6;
            margin-bottom: 30px;
            font-family: sans-serif;
        }

        .detail-action-row {
            display: flex;
            align-items: center;
            gap: 30px;
            border-top: 1px solid #EEEEEE;
            padding-top: 25px;
        }

        .detail-price {
            font-size: 32px;
            font-weight: 800;
            color: #E30613;
        }

        .buy-now-btn {
            background: #1A1A1A;
            color: #FFFFFF;
            border: none;
            padding: 15px 35px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .buy-now-btn:hover {
            background: #E30613;
        }

        .error-message {
            text-align: center;
            padding: 100px 20px;
            font-size: 24px;
            font-weight: 700;
            color: #1A1A1A;
            text-transform: uppercase;
        }

        @media (max-width: 850px) {
            .detail-wrapper {
                flex-direction: column;
                padding: 20px;
            }

            .detail-media {
                max-height: 300px;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="index.html"><img src="immagini/dbracelogo.png" alt="DB Race"></a>
        <nav>
            <a href="shop.html" data-i18n="navShop">SHOP</a>
            <a href="whoweare.html" data-i18n="navAbout">CHI SIAMO</a>
            <a href="dealersPage.html" data-i18n="navDealers">DEALERS</a>
        </nav>
        <div class="header-icons">
            <img src="immagini/bandiera-inglese.png" alt="EN">
            <a href="cart.html" class="cart-link">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count" id="cart-count">0</span>
            </a>
        </div>
    </header>

    <section class="product-page-content">
        <div class="detail-wrapper" id="product-card-detail" style="display: none;">
            <div class="detail-media">
                <img id="p-img" src="" alt="">
            </div>
            <div class="detail-info">
                <div class="category-badge" id="p-categoria"></div>
                
                <div class="detail-colors-box" id="p-colori"></div>

                <h1 id="p-nome"></h1>

                <div class="detail-compat-box">
                    Compatibilità: <strong id="p-compatibilita"></strong>
                </div>

                <div class="detail-description" id="p-descrizione"></div>

                <div class="detail-action-row">
                    <div class="detail-price" id="p-prezzo"></div>
                    <button class="buy-now-btn" id="add-to-cart-btn">
                        <i class="fa-solid fa-cart-shopping"></i> Aggiungi al carrello
                    </button>
                </div>
            </div>
        </div>

        <div id="error-box" class="error-message" style="display: none;">
            Prodotto non trovato o ID non valido.
        </div>
    </section>

    <footer>
        <div class="footer-col">
            <a href="index.html"><img src="immagini/dbracelogo.png" alt="DB Race Logo"></a>
            <a href="shop.html">shop</a>
            <a href="whoweare.html">chi siamo</a>
            <a href="dealersPage.html">dealers</a>
        </div>
        <div class="footer-col">
            <a href="#">Termini e condizioni</a>
            <a href="#">Norme su resi e rimborsi</a>
            <a href="#">Note Legali</a>
            <a href="#">Copyright</a>
        </div>
        <div class="footer-col">
            <span class="footer-title">contattaci:</span>
            <a href="#">assistenza</a>
            <a href="https://www.facebook.com/DB.RACE.official/reels/" target="_blank" rel="noopener noreferrer">facebook</a>
            <a href="https://www.instagram.com/db.race/" target="_blank" rel="noopener noreferrer">Instagram</a>
        </div>
    </footer>

    <script>
const CART_KEY = 'dbrace-cart';
let prodottoCorrente = null;
let coloreSelezionato = ''; // Conserva il colore selezionato dall'utente

// ==========================
// GESTIONE CARRELLO
// ==========================

function updateCartBadge() {
    const cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
    const count = cart.reduce((sum, item) => sum + (item.quantita || 1), 0);

    const badge = document.getElementById('cart-count');
    if (badge) {
        badge.textContent = count;
        badge.style.display = count > 0 ? 'flex' : 'none';
    }
}

function addToCart(prodotto) {
    const cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]');
    
    // Controlliamo se esiste già lo stesso identico prodotto CON lo stesso colore
    const existing = cart.find(item => item.numero === prodotto.numero && item.colore === coloreSelezionato);

    if (existing) {
        existing.quantita += 1;
    } else {
        cart.push({
            ...prodotto,
            quantita: 1,
            colore: coloreSelezionato // Aggiungiamo l'informazione sul colore all'oggetto nel carrello
        });
    }

    localStorage.setItem(CART_KEY, JSON.stringify(cart));
    updateCartBadge();
    alert(`Prodotto aggiunto al carrello! Colore: ${coloreSelezionato.toUpperCase()}`);
}

window.addToCart = addToCart;

// ==========================
// INIZIALIZZAZIONE PAGINA
// ==========================

window.addEventListener('DOMContentLoaded', () => {
    updateCartBadge();

    document.getElementById('add-to-cart-btn').addEventListener('click', () => {
        if (prodottoCorrente) {
            addToCart(prodottoCorrente);
        }
    });

    const params = new URLSearchParams(window.location.search);
    const idProdotto = parseInt(params.get('id'), 10);
    const source = params.get('source');

    if (!idProdotto) {
        mostraErrore();
        return;
    }

    let jsonFile = 'prodotti.json';
    if (source === 'bestseller') {
        jsonFile = 'bestseller.json';
    }

    fetch(jsonFile)
        .then(response => {
            if (!response.ok) throw new Error();
            return response.json();
        })
        .then(prodotti => {
            const prodotto = prodotti.find(
                p => Number(p.numero) === Number(idProdotto)
            );

            if (prodotto) {
                mostraProdotto(prodotto);
            } else {
                mostraErrore();
            }
        })
        .catch(err => {
            console.log("Errore nel caricamento dettagli.");
            mostraErrore();
        });
});

// ==========================
// RENDERING DINAMICO DATI E PALLINI
// ==========================

function mostraProdotto(p) {
    prodottoCorrente = p;

    document.getElementById('p-img').src = p.immagine;
    document.getElementById('p-img').alt = p.nome;
    document.getElementById('p-categoria').innerText = p.categoria;
    document.getElementById('p-nome').innerText = p.nome;

    const versioneTesto = p.versione && p.versione !== '-' ? p.versione : '';
    document.getElementById('p-compatibilita').innerText =
        `${p.marca} ${p.modello} ${versioneTesto}`;

    document.getElementById('p-descrizione').innerText = p.descrizione;
    document.getElementById('p-prezzo').innerText = `€ ${p.prezzo.toFixed(2)}`;

    // --- LOGICA GENERAZIONE DINAMICA PALLINI COLORE ---
    // Legge l'array dei colori dal tuo file JSON (es: p.colori = ['black', 'grey']).
    // Se non trova dati nel JSON, applica i 4 colori di default del tuo bozzetto grafico.
    const coloriDisponibili = p.colori || ['red', 'grey', 'lightgrey', 'blue'];
    const coloriContainer = document.getElementById('p-colori');
    
    // Svuotiamo il contenitore per evitare duplicazioni accidentali
    coloriContainer.innerHTML = ''; 

    coloriDisponibili.forEach((colore, index) => {
        const dot = document.createElement('span');
        dot.className = `color-dot ${colore}`;
        dot.title = colore.toUpperCase();
        
        // Seleziona automaticamente il primo colore disponibile all'apertura
        if (index === 0) {
            dot.classList.add('active');
            coloreSelezionato = colore;
        }

        // Evento al click per scambiare lo stato attivo tra i pallini
        dot.addEventListener('click', () => {
            document.querySelectorAll('.detail-colors-box .color-dot').forEach(d => d.classList.remove('active'));
            dot.classList.add('active');
            coloreSelezionato = colore; // Aggiorna la scelta colore attuale
        });

        coloriContainer.appendChild(dot);
    });

    document.getElementById('product-card-detail').style.display = 'flex';
}

function mostraErrore() {
    document.getElementById('error-box').style.display = 'block';
}
</script>
</body>

</html>
