<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB Race - Portatarga KTM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <span class="logo-italic"><span class="green">d</span><span class="white">b</span><span class="red">r</span>ace</span>
        </div>
        <nav class="nav-links">
            <a href="#">DB RACE</a>
            <a href="#">DIVENTA DEALER</a>
            <a href="#">WORLDWIDE DEALERS</a>
            <a href="#" class="lang-selector">
                <img src="https://flagcdn.com/w20/gb.png" alt="English">
            </a>
        </nav>
        <div class="cart-container">
            <i class="fa-solid fa-shopping-cart cart-icon"></i>
            <span class="cart-badge">0</span>
        </div>
    </header>

    <main class="hero">
        <div class="hero-text">
            <h1>PORTATARGA <span class="orange-text">KTM</span></h1>
        </div>

        <div class="selection-bar">
            <div class="selection-container">
                <span class="selection-title">SELEZIONA LA TUA MOTO —</span>
                <div class="custom-select-wrapper">
                    <div class="custom-select">
                        <div class="custom-select-trigger">
                            <span>SCEGLI...</span>
                            <div class="arrow"></div>
                        </div>
                        <div class="custom-options">
                            <span class="custom-option" data-value="duke-125">KTM Duke 125</span>
                            <span class="custom-option" data-value="duke-390">KTM Duke 390</span>
                            <span class="custom-option" data-value="duke-790">KTM Duke 790</span>
                            <span class="custom-option" data-value="superduke-1290">KTM Super Duke 1290</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
